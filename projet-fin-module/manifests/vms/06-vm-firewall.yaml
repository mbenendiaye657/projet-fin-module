# VM1 — Passerelle/Firewall (Ubuntu 22.04 + iptables)
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-firewall
  namespace: mbened-dev
  labels:
    app: firewall
spec:
  runStrategy: Manual
  template:
    metadata:
      labels:
        app: firewall
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm-firewall
              user: cloud-user
              password: openshift123
              chpasswd: { expire: False }
              packages:
                - iptables
                - iptables-persistent
              runcmd:
                - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
                - sysctl -p
                - iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
                - iptables -A FORWARD -m state --state RELATED,ESTABLISHED -j ACCEPT
                - iptables -A FORWARD -i eth0 -o eth1 -p tcp --dport 80 -j ACCEPT
                - iptables -A FORWARD -i eth1 -o eth2 -p tcp --dport 3306 -j ACCEPT
                - iptables -A FORWARD -j DROP
                - netfilter-persistent save
      terminationGracePeriodSeconds: 0
